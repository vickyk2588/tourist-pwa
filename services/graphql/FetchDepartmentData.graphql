query FetchDepartmentData {
  departments(pagination: { limit: 50 }) {
    data {
      id
      attributes {
        Name
        icon {
          data {
            attributes {
              url
            }
          }
        }

        places(pagination: { limit: 100 }) {
          data {
            id
            attributes {
              name
              link

              images {
                data {
                  attributes {
                    url
                  }
                }
              }

              city {
                data {
                  attributes {
                    name
                  }
                }
              }

              placeDetail {
                data {
                  attributes {
                    slug
                    content {
                      __typename

                      ... on ComponentPlaceDetailPlacetickets {
                        id
                        title1
                        title2
                        information {
                          title
                          description
                        }
                        card {
                          title
                          content {
                            name
                            value
                          }
                        }
                      }

                      ... on ComponentPlaceDetailPlaceothers {
                        id
                        title1
                        title2
                        card(pagination: { limit: 100 }) {
                          title
                          content(pagination: { limit: 100 }) {
                            name
                            value
                          }
                        }
                      }

                    }
                  }
                }
              }

            }
          }
        }

      }
    }
  }
}