query FetchItineries {
  suggestedItinerie {
    data {
      attributes {
        content {
          __typename
          ... on ComponentCommonBanner {
            title

            description

            image {
              data {
                attributes {
                  url
                }
              }
            }
          }

          ... on ComponentSuggestedItineriesItinerary {
            titile

            cityItinerary {
              details
            }
          }
        }
      }
    }
  }
}
