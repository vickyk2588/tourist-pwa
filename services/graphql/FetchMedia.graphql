query FetchMedia {
  events {
    data {
      attributes {
        title
        description
        image {
          data {
            attributes {
              url
            }
          }
        }
      }
    }
  }

  galleries {
    data {
      attributes {
        title
        align
        image {
          data {
            attributes {
              url
            }
          }
        }
      }
    }
  }

  allMedia {
    data {
      attributes {
        content {
          __typename

          ... on ComponentFilmistanBanner {
            id
            bannerTitle
            bannerDetails
            bannerDetails2
            bannerImage {
              data {
                attributes {
                  url
                }
              }
            }
          }

          ... on ComponentMediaVideo {
            id
            title
            description
            mainContent: content {
              id
              thumbnail{
                data{
                  attributes{
                    url
                  }
                }
              }
              video {
                data {
                  attributes {
                    url
                  }
                }
              }
            }
          }

          ... on ComponentMediaPrintAds {
            id

            title

            print_ads {
              data {
                attributes {
                  title
                  pdf {
                    data {
                      attributes {
                        url
                      }
                    }
                  }
                }
              }
            }
          }

          ... on ComponentCommonPolicyCard {
            id
            title
            type
            content {
              id
              title
              link
            }
          }

          ... on ComponentHomeDiscoverBeautifulPlace {
            id
            title
            content {
              id
              description
              place {
                data {
                  attributes {
                    name
                    images {
                      data {
                        attributes {
                          url
                        }
                      }
                    }
                  }
                }
              }

              video {
                data {
                  attributes {
                    url
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
